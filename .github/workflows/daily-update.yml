name: Daily Repository Update

on:
  schedule:
    - cron: '30 6 * * *'   # Runs daily at 06:30 UTC (specific minute/hour)
  workflow_dispatch:       # Allows manual trigger for testing

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Daily commit - 23f2005377@ds.study.iitm.ac.in
        run: |
          echo "Last updated on $(date)" >> daily-log.txt
          git config user.name "DevSync Bot"
          git config user.email "23f2005377@ds.study.iitm.ac.in"
          git add daily-log.txt
          git commit -m "Automated daily update" || echo "No changes to commit"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
